name: data515

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10

  # core data stack
  - numpy=2.2.6
  - pandas=2.3.3
  - matplotlib=3.10.8
  - requests=2.32.5
  - beautifulsoup4=4.14.3
  - tqdm=4.67.3
  - pyarrow=23.0.1

  # notebooks
  - jupyterlab
  - ipykernel

  # dev tools
  - pylint=4.0.4
  - coverage=7.6.1

  # Dash testing requirements
  - multiprocess
  - selenium
  - chromium
  - chromium-driver

  # pip support
  - pip

  - pip:
      - streamlit==1.55.0
      - dash==4.0.0
      - dash-bootstrap-components==2.0.4
      - plotly==6.6.0
      - altair==6.0.0
      - kroger-api==0.2.0
      - python-dotenv==1.2.2
      - pytest==9.0.2
      - hypothesis==6.151.9
      - pipreqs==0.5.0
      - build==1.4.0